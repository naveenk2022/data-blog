baseURL: https://naveenkannan.dev
languageCode: en-us
title: Naveen Kannan
theme: ["hugo-admonitions", "hugo-PaperMod"]
pagination:
  disableAliases: false
  pagerSize: 5
  path: page
params:
  profileMode:
    enabled: false
    title: "Data Engineer"
    imageUrl: "/images/avatar.png" # optional
    imageTitle: "The Tri-Angled Truth"
    imageWidth: 294 # custom size
    imageHeight: 470 # custom size
  images: ["images/avatar.png"] 
  ShowReadingTime: true
  ShowFullTextinRSS: true
  ShowAllPagesInArchive: true 
  ShowPageNums: true
  description: "A data engineering blog dedicated to documenting powerful yet simple data engineering tips and tricks, discovered through real world experience."
  homeInfoParams:  
    Title: "Welcome to my blog!"  
    Content: >
      This is my personal little nerd cave. 
      
      I like to share some of the cool stuff I work on via my blog. 
      
      I hope you find something useful here!
  socialIcons: # optional
    - name: github
      url: "https://github.com/naveenk2022"
    - name: linkedin
      url: "https://www.linkedin.com/in/naveenkannan1/"
    - name: rss
      url: "https://naveenkannan.dev/index.xml" # Your RSS feed url path
  assets:
    favicon: "assets/favicon.svg"
    favicon16x16: "assets/favicon.svg"
    favicon32x32: "assets/favicon.svg"
    apple_touch_icon: "assets/favicon.svg"
    safari_pinned_tab: "assets/favicon.svg"
languages:
  en:
    languageName: "English"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Archive
          url: archives/
          weight: 10
        - name: Publications
          url: publications
          weight: 10
        - name: Search
          url: search/
          weight: 20
        - name: Tags
          url: tags/
          weight: 10
        - name: About
          url: about
          weight: 10

outputs:
  home:
    - HTML
    - RSS
    - JSON
caches:
  images:
    dir: :cacheDir/images

module:
  mounts:
  - source: assets
    target: assets
  - source: static
    target: assets